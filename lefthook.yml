# Lefthook hooks for CoDo (Next.js + ESLint + oxfmt + tests)
# https://lefthook.dev/configuration/
# Tests: any file matching *.test.* or *.spec.* is run via `bun test`.

pre-commit:
  parallel: true
  jobs:
    - name: lint
      glob: "*.{js,jsx,ts,tsx,mjs,cjs}"
      exclude:
        - "components/ui/**"
      run: bunx eslint {staged_files}

    - name: format check
      glob: "*.{js,jsx,ts,tsx,mjs,cjs,json}"
      exclude:
        - "components/ui/**"
        - "bun.lock"
        - "tsconfig.json"
        - ".oxfmtrc.json"
        - ".next/**"
        - ".vscode/**"
        - ".agents/**"
      run: bunx oxfmt --check {staged_files}

    - name: fmt
      glob: "*.{js,jsx,ts,tsx,mjs,cjs,json,css,md}"
      exclude:
        - "components/ui/**"
        - "bun.lock"
        - ".next/**"
      run: bunx oxfmt {staged_files}

    - name: test
      glob: "**/*.{ts,tsx}"
      exclude:
        - "**/node_modules/**"
        - "**/.next/**"
        - "**/components/ui/**"
        - "**/.agents/**"
        - "**/.vscode/**"
        - "**/*.tsbuildinfo"
        - "next-env.d.ts"
      run: bun run test

pre-push:
  parallel: true
  jobs:
    - name: lint (all)
      run: bunx eslint . --max-warnings 0

    - name: typecheck
      run: bunx tsc --noEmit

    - name: test
      run: bun run test

    - name: format check
      run: bunx oxfmt --check app components lib packages hooks css --no-error-on-unmatched-pattern
